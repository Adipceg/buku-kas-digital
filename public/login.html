<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Buku Kas Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-indigo-900 via-purple-800 to-indigo-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-indigo-900 tracking-tight">📊 BUKU KAS DIGITAL</h1>
            <p id="auth-subtitle" class="text-gray-600 text-sm mt-1">Silakan masuk menggunakan akun kas kamu</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-1">Alamat Gmail</label>
                <input type="email" id="email" placeholder="nama@gmail.com" required 
                    class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-1">Password Aplikasi</label>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition text-sm">
            </div>
            <button type="submit" id="btn-submit" 
                class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-700 active:scale-[0.98] transition-all">
                Masuk Sekarang
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-gray-200">
            <p id="toggle-text" class="text-xs text-gray-600">
                Belum punya akun Buku Kas? 
                <button onclick="toggleAuthMode()" class="text-indigo-600 font-bold hover:underline focus:outline-none">Daftar Akun Baru</button>
            </p>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        const form = document.getElementById('auth-form');
        const authSubtitle = document.getElementById('auth-subtitle');
        const btnSubmit = document.getElementById('btn-submit');
        const toggleText = document.getElementById('toggle-text');

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authSubtitle.innerText = "Silakan masuk menggunakan akun kas kamu";
                btnSubmit.innerText = "Masuk Sekarang";
                toggleText.innerHTML = `Belum punya akun Buku Kas? <button onclick="toggleAuthMode()" class="text-indigo-600 font-bold hover:underline focus:outline-none">Daftar Akun Baru</button>`;
            } else {
                authSubtitle.innerText = "Gunakan alamat Gmail & buat password baru untuk aplikasi ini";
                btnSubmit.innerText = "Daftar Akun Baru";
                toggleText.innerHTML = `Sudah punya akun Buku Kas? <button onclick="toggleAuthMode()" class="text-indigo-600 font-bold hover:underline focus:outline-none">Login ke Aplikasi</button>`;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error);

                alert(data.message);
                if (isLoginMode) {
                    window.location.href = '/index.html'; // Pindah ke dashboard kas jika berhasil login
                } else {
                    toggleAuthMode(); // Balik ke halaman login setelah sukses register
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
